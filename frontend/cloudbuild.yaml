steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_AUTH_MODE=${_NEXT_PUBLIC_AUTH_MODE}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SITE_URL=${_NEXT_PUBLIC_SITE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_KEY=${_NEXT_PUBLIC_POSTHOG_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_HOST=${_NEXT_PUBLIC_POSTHOG_HOST}'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_DEBUG=${_NEXT_PUBLIC_POSTHOG_DEBUG}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/financesums-frontend'
      - '.'
images:
  - 'gcr.io/$PROJECT_ID/financesums-frontend'
substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: ''
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ''
  _NEXT_PUBLIC_AUTH_MODE: 'supabase'
  _NEXT_PUBLIC_SITE_URL: ''
  _NEXT_PUBLIC_POSTHOG_KEY: ''
  _NEXT_PUBLIC_POSTHOG_HOST: ''
  _NEXT_PUBLIC_POSTHOG_DEBUG: ''
